apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: bitcert-attest
  annotations:
    argocd.argoproj.io/sync-wave: '50'
  labels:
    app.kubernetes.io/name: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello
    spec:
      containers:
      - name: hello
        image: ghcr.io/jbyee-test-org/bitcert/hello@sha256:850a1685bc5f13ea67f81b4c27ed5f8088fab1c597bdd2bf97a07d63e7390665
        ports:
        - containerPort: 8080
