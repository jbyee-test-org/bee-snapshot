apiVersion: batch/v1
kind: Job
metadata:
  name: ingestion-migrate-1c6d3f44e485
  namespace: bitcert-attest
  labels:
    bee.dev/module: ingestion
    bee.dev/mighash: 1c6d3f44e485
  annotations:
    argocd.argoproj.io/sync-wave: '-99'
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: flyway
        image: flyway/flyway:10-alpine
        args:
        - -url=jdbc:postgresql://postgres.bee-substrate.svc.cluster.local:5432/bee
        - -user=bee
        - -password=bee-demo
        - -connectRetries=30
        - -schemas=attest,public
        - -table=flyway_history_ingestion
        - -locations=filesystem:/sql
        - -baselineOnMigrate=true
        - migrate
        volumeMounts:
        - name: sql
          mountPath: /sql
      volumes:
      - name: sql
        configMap:
          name: ingestion-migrations
