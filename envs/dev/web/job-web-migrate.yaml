apiVersion: batch/v1
kind: Job
metadata:
  name: web-migrate
  namespace: bitcert-attest
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: flyway
        image: flyway/flyway:10-alpine
        args:
        - -url=jdbc:postgresql://postgres.bee-substrate.svc.cluster.local:5432/bee
        - -user=bee
        - -password=bee-demo
        - -connectRetries=30
        - -table=flyway_history_web
        - -locations=filesystem:/grants
        - -baselineOnMigrate=true
        - migrate
        volumeMounts:
        - name: grants
          mountPath: /grants
      volumes:
      - name: grants
        configMap:
          name: web-grants
