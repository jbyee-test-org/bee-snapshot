apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bitcert-attest
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
      - name: web
        image: ghcr.io/jbyee-test-org/bitcert/web@sha256:fc213a6eeb0b04cfffb5a6eae7f3a6296047d49506358b3af466c4c94f45f0f2
        ports:
        - containerPort: 8080
