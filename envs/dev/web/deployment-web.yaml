apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bitcert-attest
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
      - name: web
        image: ghcr.io/jbyee-test-org/bitcert/web@sha256:0cc7641cfb3bcce428d3bff81bc9b5c046d24223c8af3a8c69c56f49e440a56c
        ports:
        - containerPort: 8080
