apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bitcert-attest
  annotations:
    argocd.argoproj.io/sync-wave: '50'
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
      - name: web
        image: ghcr.io/jbyee-test-org/bitcert/web@sha256:2f04afd60f75b9eca7e55fe87ef3b8bfdb81addf319a0db5be34cb78b5578a44
        ports:
        - containerPort: 8080
