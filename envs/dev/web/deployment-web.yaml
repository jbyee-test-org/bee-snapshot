apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bitcert-attest
  annotations:
    argocd.argoproj.io/sync-wave: '2'
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
      - name: web
        image: ghcr.io/jbyee-test-org/bitcert/web@sha256:7cf40d2dc82cbbf0850ffd7357b20c62921ce4b72c9c8e037da6bbd1276d4ae4
        ports:
        - containerPort: 8080
