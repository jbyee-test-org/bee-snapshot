# web 모듈 — 논리만(origin-free, 규칙 4). hello 의존 → 서브그래프·backdrop 실증(규칙 6·7).
metadata:
  name: web
spec:
  product: attest
  chart:
    version: "0.4.0"            # bee-module pin (G6)
  image:
    name: web
  dependsOn: [hello]
  routing:
    - { path: /web/v1, port: 8080 }
  # events 어휘 제거(G42) — 접속형(connect-to). 구독은 natsUrl 좌표로 런타임에 직접.
  db:
    name: attest-db
    grants:                     # cross-schema 명시 선언(G14) → chart 가 R__grants.sql 파생
      - { schema: attest, access: read }
